{% extends 'admin/base_admin.html' %}

{% block title %}Admin Profile | RentXplore{% endblock %}

{% block content %}
<style>
    :root {
        --accent-color: #3b82f6;
        --sidebar-bg: #0f172a;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --bg-light: #f8fafc;
        --border-color: #e2e8f0;
    }

    .profile-container { 
        padding: 30px; 
        animation: fadeIn 0.5s ease-in-out; 
    }

    /* Header Section */
    .profile-header-card {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        border-radius: 24px;
        padding: 40px;
        display: flex;
        align-items: center;
        gap: 25px;
        margin-bottom: 30px;
        color: white;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .profile-avatar-large {
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid var(--accent-color);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: var(--accent-color);
    }

    .profile-info-header h1 { font-size: 1.8rem; margin: 0; font-weight: 800; }
    .profile-info-header p { opacity: 0.7; margin: 5px 0 0; font-size: 0.9rem; }

    /* Form Card Styling */
    .settings-card {
        background: white;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        padding: 30px;
        margin-bottom: 25px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .settings-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .settings-title i { color: var(--accent-color); }

    /* Form Controls */
    .form-group { margin-bottom: 1.5rem; position: relative; }
    
    .form-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        font-size: 0.95rem;
        color: var(--text-main);
        transition: all 0.3s;
        background: var(--bg-light);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--accent-color);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* Password Visibility Toggle */
    .password-wrapper { position: relative; }
    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1rem;
        transition: color 0.2s;
        z-index: 10;
        padding: 5px;
    }
    .toggle-password:hover { color: var(--accent-color); }

    /* Buttons */
    .btn-save {
        background: var(--accent-color);
        color: white;
        padding: 12px 28px;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .btn-save:hover {
        background: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
    }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="profile-container">
    <div class="profile-header-card">
        <div class="profile-avatar-large">
            <i class="fas fa-user-shield"></i>
        </div>
        <div class="profile-info-header">
            <h1>Admin Profile</h1>
            <p>Managing account settings for <span style="color: var(--accent-color); font-weight: 700;">Rent<span>X</span>plore</span></p>
        </div>
    </div>

    <div class="settings-card">
        <h2 class="settings-title"><i class="fas fa-id-card"></i> Admin Information</h2>
        <form method="POST" action="{% url 'admin_profile' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="update_general">
            
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" name="first_name" value="{{ request.user.first_name }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" name="last_name" value="{{ request.user.last_name }}">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" value="{{ request.user.email }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" name="phone" value="{{ admin_profile.phone|default:'' }}" placeholder="">
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Update Profile
                </button>
            </div>
        </form>
    </div>

    <div class="settings-card">
        <h2 class="settings-title"><i class="fas fa-lock"></i> Security & Password</h2>
        <form method="POST" action="{% url 'admin_profile' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="change_password">
            
            <div style="max-width: 650px;">
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" name="current_password" id="cur_pass" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePass('cur_pass', this)"></i>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" name="new_password" id="new_pass" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePass('new_pass', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" name="confirm_password" id="conf_pass" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePass('conf_pass', this)"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" class="btn-save" style="background: var(--sidebar-bg);">
                    <i class="fas fa-key"></i> Update Password
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePass(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>
{% endblock %}
